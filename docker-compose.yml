# Smart Leads Dashboard - Docker Compose

version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: smartleads-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smart_leads_db
    volumes:
      - mongo_data:/data/db
    networks:
      - smartleads-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartleads-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/smart_leads_db
      - JWT_SECRET=change_this_to_a_strong_secret_in_production
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - smartleads-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
    container_name: smartleads-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - smartleads-network

volumes:
  mongo_data:
    driver: local

networks:
  smartleads-network:
    driver: bridge
